---
- name: OS Patching and Compliance Collection
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Get kernel version before patching
      ansible.builtin.command: uname -r
      register: kernel_before
      changed_when: false

    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      register: apt_upgrade

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Set reboot required fact
      ansible.builtin.set_fact:
        needs_reboot: "{{ reboot_required_file.stat.exists }}"

    - name: Reboot target VM if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: needs_reboot

    - name: Get kernel version after patching
      ansible.builtin.command: uname -r
      register: kernel_after
      changed_when: false

    - name: Write patch compliance summary to local JSON file
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        content: |
          {
            "packages_updated": {{ apt_upgrade.stdout_lines | default([]) | length }},
            "reboot_required": {{ needs_reboot | to_json }},
            "kernel_before": "{{ kernel_before.stdout | trim }}",
            "kernel_after": "{{ kernel_after.stdout | trim }}",
            "success": true
          }
        dest: "{{ playbook_dir }}/../patch_result.json"
        mode: '0644'
